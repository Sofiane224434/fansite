# Vhost pour le reverse proxy Nginx HOTE du VPS.
# A deposer dans /etc/nginx/sites-available/fansite.azim404.com puis:
#   sudo ln -s /etc/nginx/sites-available/fansite.azim404.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d fansite.azim404.com

server {
    listen 80;
    listen [::]:80;
    server_name fansite.azim404.com;

    # Sera remplace par certbot pour la redirection HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    access_log /var/log/nginx/fansite.azim404.com.access.log;
    error_log  /var/log/nginx/fansite.azim404.com.error.log;
}
