services:
  fansite:
    image: nginx:alpine
    container_name: fansite
    restart: unless-stopped
    ports:
      - "127.0.0.1:3008:80"
    volumes:
      - ./Malaisie:/usr/share/nginx/html:ro
      - ./deploy/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
